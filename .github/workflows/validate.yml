name: Validate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: Build + schema check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx astro check

      # The Astro build runs Zod against every topic frontmatter and resolves
      # every connection reference. A schema violation or a broken link fails
      # the build — which is exactly the validation we want.
      - name: Build site
        run: npm run build
